<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>矮人矿坑 - 游戏大厅</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #2c3e50; color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #34495e; padding: 10px 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        button { background: #e67e22; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #d35400; }
        
        #tabletop { flex: 1; background-color: #3e2723; margin: 20px 0; border-radius: 10px; position: relative; overflow: auto; display: none; border: 5px solid #5d4037; box-shadow: inset 0 0 50px rgba(0,0,0,0.8); }
        .grid-container { position: relative; width: 1500px; height: 800px; cursor: crosshair; }
        
        .card { width: 70px; height: 100px; background: #ecf0f1; color: #2c3e50; border-radius: 6px; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; border: 2px solid #bdc3c7; cursor: pointer; user-select: none; }
        
        /* 超大字体用来显示道路符号 */
        .card-symbol { font-size: 60px; line-height: 60px; font-weight: normal; color: #7f8c8d; }
        .start-card { background: #27ae60; color: white; border-color: #2ecc71; }
        .start-card .card-symbol { color: white; font-size: 30px; font-weight: bold; }
        .goal-card { background: #34495e; color: white; border-color: #95a5a6; }
        .goal-card .card-symbol { color: #bdc3c7; font-size: 30px; }
        
        .board-card { position: absolute; }
        #player-area { background: #1a252f; padding: 15px; border-radius: 8px; display: none; }
        #my-hand { display: flex; gap: 10px; margin-top: 10px; }
        .hand-card { transition: transform 0.2s; }
        .hand-card:hover { transform: translateY(-10px); background: #f1c40f; border-color: #f39c12; }
        .hand-card.selected { transform: translateY(-20px); background: #f1c40f; border: 3px solid #e74c3c; box-shadow: 0 0 15px rgba(231, 76, 60, 0.8); }
        .role-text { color: #e74c3c; font-size: 1.2em; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h2>⛏️ 矮人矿坑 (Saboteur)</h2>
            <p style="margin: 0; color: #bdc3c7;">房间人数: <span id="player-count">0</span>/10 | 等待最少3人开始</p>
        </div>
        <button id="start-btn" onclick="startGame()">▶ 开始游戏 (发牌与布阵)</button>
    </div>

    <div id="tabletop">
        <div class="grid-container" id="board-grid"></div>
    </div>

    <div id="player-area">
        <div>你的隐藏身份: <span id="my-role" class="role-text"></span></div>
        <div id="turn-status" style="color: #f1c40f; font-size: 1.2em; font-weight: bold; margin-top: 10px;">等待游戏开始...</div>
        <button id="discard-btn" onclick="discardSelectedCard()" style="display:none; background: #c0392b; margin-top: 10px;">🗑️ 弃掉选中的牌 (Pass)</button>
        <div id="my-hand"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let selectedCard = null;

        socket.on('playerJoined', data => document.getElementById('player-count').innerText = data.playerCount);
        socket.on('playerLeft', data => document.getElementById('player-count').innerText = data.playerCount);
        function startGame() { socket.emit('requestStartGame'); }

        socket.on('gameStarted', (data) => {
            document.getElementById('tabletop').style.display = 'block';
            document.getElementById('player-area').style.display = 'block';
            document.getElementById('my-role').innerText = data.yourRole;
            renderHand(data.yourHand);
            renderBoard(data.board);
        });

        function renderHand(hand) {
            const handDiv = document.getElementById('my-hand');
            handDiv.innerHTML = ''; 
            hand.forEach(card => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card hand-card';
                // 使用大号字体显示道路图案
                cardDiv.innerHTML = `<div class="card-symbol">${card.name}</div><div style="font-size:10px;">${card.type==='path'?'道路':'行动'}</div>`;
                
                cardDiv.onclick = () => {
                    document.querySelectorAll('.hand-card').forEach(c => c.classList.remove('selected'));
                    cardDiv.classList.add('selected');
                    selectedCard = card; 
                    document.getElementById('discard-btn').style.display = 'inline-block';
                };
                handDiv.appendChild(cardDiv);
            });
        }

        function renderBoard(boardData) {
            const boardGrid = document.getElementById('board-grid');
            boardGrid.innerHTML = '';
            const baseX = 100, baseY = 350, cardWidth = 80, cardHeight = 110; 

            for (const [coord, card] of Object.entries(boardData)) {
                const [x, y] = coord.split(',').map(Number);
                const cardEl = document.createElement('div');
                cardEl.style.left = `${baseX + x * cardWidth}px`;
                cardEl.style.top = `${baseY + y * cardHeight}px`;
                
                cardEl.innerHTML = `<div class="card-symbol">${card.name}</div>`;
                
                if (card.type === 'start') cardEl.className = 'card board-card start-card';
                else if (card.type === 'goal') { 
                    cardEl.className = 'card board-card goal-card'; 
                    // 如果 faceUp 是 true，就显示 💎 或 🪨，否则显示 ?
                    cardEl.innerHTML = `<div class="card-symbol">${card.faceUp ? card.name : '?'}</div>`; 
                }
                else cardEl.className = 'card board-card'; 
                
                boardGrid.appendChild(cardEl);
            }
        }

        document.getElementById('board-grid').onclick = (event) => {
            if (!selectedCard) { alert("请先在下方选中一张手牌！"); return; }
            const rect = document.getElementById('board-grid').getBoundingClientRect();
            const gridX = Math.round((event.clientX - rect.left - 100) / 80);
            const gridY = Math.round((event.clientY - rect.top - 350) / 110);

            socket.emit('playCard', { card: selectedCard, targetX: gridX, targetY: gridY });
            
            selectedCard = null;
            document.getElementById('discard-btn').style.display = 'none';
            document.querySelectorAll('.hand-card').forEach(c => c.classList.remove('selected'));
        };

        function discardSelectedCard() {
            if (!selectedCard) return;
            if(confirm(`确定要弃掉并且跳过本回合吗？`)) {
                socket.emit('discardCard', { card: selectedCard });
                selectedCard = null;
                document.getElementById('discard-btn').style.display = 'none';
                document.querySelectorAll('.hand-card').forEach(c => c.classList.remove('selected'));
            }
        }

        socket.on('errorMsg', msg => alert(msg));
        socket.on('gameMsg', msg => alert(msg)); // 接收普通消息 (比如挖到了石头)
        
        // 接收游戏结束消息
        socket.on('gameOver', data => {
            alert(data.msg);
            const statusDiv = document.getElementById('turn-status');
            statusDiv.innerText = "游戏结束：" + data.msg;
            statusDiv.style.color = data.winners === 'Gold Miner' ? "#2ecc71" : "#e74c3c";
            // 锁定桌面，不允许再放牌
            document.getElementById('board-grid').onclick = null; 
            document.getElementById('discard-btn').style.display = 'none';
        });
        socket.on('boardUpdated', newBoard => renderBoard(newBoard));
        socket.on('handUpdated', data => renderHand(data.yourHand));
        socket.on('turnUpdated', data => {
            const statusDiv = document.getElementById('turn-status');
            if (data.currentTurnId === socket.id) {
                statusDiv.innerText = "👉 现在轮到你出牌了！";
                statusDiv.style.color = "#2ecc71";
            } else {
                statusDiv.innerText = "⏳ 等待其他玩家出牌...";
                statusDiv.style.color = "#e74c3c";
            }
        });
    </script>
</body>
</html>
