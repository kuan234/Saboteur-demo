<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>矮人矿坑 - 游戏大厅</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-dark: #121619;
            --panel-bg: rgba(30, 42, 56, 0.85);
            --primary: #f39c12;
            --primary-hover: #d35400;
            --text-main: #ecf0f1;
            --glass-border: rgba(255, 255, 255, 0.15);
            --font-title: 'ZCOOL KuaiLe', cursive;
            --font-main: 'Noto Sans SC', sans-serif;
        }

        body {
            font-family: var(--font-main);
            background: radial-gradient(circle at center, #2c3e50 0%, #111418 100%);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
        }

        h2 {
            font-family: var(--font-title);
            margin: 0 0 5px 0;
            font-size: 28px;
            color: var(--primary);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        button {
            background: linear-gradient(135deg, var(--primary), #e67e22);
            color: white;
            border: none;
            padding: 8px 18px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(230, 126, 34, 0.4);
        }

        button:active {
            transform: translateY(1px);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        button:disabled {
            background: #7f8c8d;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        input {
            background: rgba(0, 0, 0, 0.2);
            color: white;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.5);
            transition: border-color 0.2s;
        }

        input:focus {
            border: 1px solid var(--primary) !important;
            outline: none;
        }

        #tabletop {
            flex: 1;
            background: radial-gradient(circle at center, #4e342e 0%, #261714 80%);
            margin: 20px 0;
            border-radius: 12px;
            position: relative;
            overflow: auto;
            display: none;
            border: 4px solid #3e2723;
            box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.9), 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .grid-container {
            position: relative;
            width: 1500px;
            height: 800px;
            cursor: crosshair;
        }

        .grid-cell {
            position: absolute;
            width: 80px;
            height: 110px;
            border: 1px dashed rgba(255, 255, 255, 0.08);
            box-sizing: border-box;
            pointer-events: none;
            border-radius: 6px;
        }

        .grid-cell.placeable {
            border-color: rgba(46, 204, 113, 0.6);
            background: rgba(46, 204, 113, 0.1);
            box-shadow: inset 0 0 15px rgba(46, 204, 113, 0.2);
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0% {
                box-shadow: inset 0 0 15px rgba(46, 204, 113, 0.2);
            }

            50% {
                box-shadow: inset 0 0 25px rgba(46, 204, 113, 0.4);
            }

            100% {
                box-shadow: inset 0 0 15px rgba(46, 204, 113, 0.2);
            }
        }

        .card {
            width: 70px;
            height: 100px;
            background: linear-gradient(135deg, #ecf0f1, #bdc3c7);
            color: #2c3e50;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border: 1px solid #95a5a6;
            cursor: pointer;
            user-select: none;
            position: relative;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card-symbol {
            font-size: 55px;
            line-height: 55px;
            font-weight: normal;
            color: #34495e;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
            transition: transform 0.4s ease;
        }

        .start-card {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            border-color: #1abc9c;
        }

        .start-card .card-symbol {
            color: white;
            font-size: 28px;
            font-weight: bold;
            font-family: var(--font-title);
        }

        .goal-card {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
            border-color: #7f8c8d;
        }

        .goal-card .card-symbol {
            color: #bdc3c7;
            font-size: 28px;
            font-family: var(--font-title);
        }

        .board-card {
            position: absolute;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.6);
        }

        #player-area {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 12px;
            display: none;
            border: 1px solid var(--glass-border);
            box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        #my-hand {
            display: flex;
            gap: 15px;
            margin-top: 12px;
            min-height: 110px;
        }

        .hand-card:hover {
            transform: translateY(-12px) scale(1.05);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.5);
            z-index: 2;
        }

        .hand-card.selected {
            transform: translateY(-20px) scale(1.05);
            border: 2px solid var(--primary);
            box-shadow: 0 0 20px rgba(243, 156, 18, 0.8), 0 15px 25px rgba(0, 0, 0, 0.5);
            z-index: 3;
        }

        .role-text {
            color: var(--primary);
            font-size: 1.2em;
            font-family: var(--font-title);
            letter-spacing: 1px;
        }

        #score-board {
            margin-top: 10px;
            font-size: 0.9em;
            color: #ecf0f1;
        }

        #player-list {
            margin-top: 8px;
            font-size: 0.85em;
        }

        .player-item {
            display: inline-block;
            padding: 4px 8px;
            margin-right: 6px;
            border-radius: 4px;
            background: #2c3e50;
            cursor: pointer;
        }

        .player-item.selected {
            background: #16a085;
        }

        .player-item.current {
            border: 2px solid #f1c40f;
        }

        /* 聊天室 */
        #chat-panel {
            position: fixed;
            right: 20px;
            bottom: 20px;
            width: 300px;
            max-height: 400px;
            background: rgba(26, 37, 47, 0.95);
            border-radius: 10px;
            border: 1px solid #34495e;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }

        #chat-panel .chat-header {
            padding: 8px 12px;
            background: #34495e;
            border-radius: 10px 10px 0 0;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            max-height: 280px;
            min-height: 80px;
            font-size: 13px;
        }

        #chat-messages .chat-msg {
            margin-bottom: 6px;
            line-height: 1.4;
        }

        #chat-messages .chat-msg .chat-name {
            color: #f1c40f;
            font-weight: bold;
        }

        #chat-messages .chat-msg .chat-time {
            color: #7f8c8d;
            font-size: 11px;
            margin-left: 6px;
        }

        #chat-input-area {
            display: flex;
            border-top: 1px solid #34495e;
        }

        #chat-input-area input {
            flex: 1;
            padding: 8px;
            border: none;
            background: #2c3e50;
            color: white;
            font-size: 13px;
            border-radius: 0 0 0 10px;
            outline: none;
        }

        #chat-input-area button {
            padding: 8px 12px;
            font-size: 13px;
            border-radius: 0 0 10px 0;
            background: #16a085;
        }

        #chat-input-area button:hover {
            background: #1abc9c;
        }
    </style>
</head>

<body>
    <div class="header">
        <div>
            <h2>⛏️ 矮人矿坑 Saboteur</h2>
            <p style="margin: 0; color: #bdc3c7;">
                房间号: <span id="room-id">-</span> |
                房间人数: <span id="player-count">0</span>/10 | 等待最少3人开始
            </p>
        </div>
        <div>
            <input id="name-input" placeholder="输入昵称"
                style="width:110px;padding:6px;border-radius:4px;border:none;margin-right:4px;">
            <button onclick="confirmName()"
                style="background:#3498db;padding:6px 10px;font-size:13px;margin-right:8px;">✔ 确认名字</button>
            <input id="room-input" placeholder="房间号"
                style="width:80px;padding:6px;border-radius:4px;border:none;margin-right:8px;">
            <button onclick="createRoom()">创建房间</button>
            <button onclick="joinRoom()">加入房间</button>
            <button id="start-btn" onclick="startGame()" style="margin-left:8px;">▶ 开始游戏 (房主)</button>
            <button id="voice-btn" onclick="toggleVoice()"
                style="margin-left:8px;background:linear-gradient(135deg, #16a085, #1abc9c);">🎙 开启语音</button>
        </div>
    </div>

    <div id="tabletop">
        <div class="grid-container" id="board-grid"></div>
    </div>

    <div id="player-area">
        <div><span id="my-name" style="color:var(--primary);font-weight:bold;font-size:1.1em;"></span> <span
                style="color:#7f8c8d">|</span> 隐藏身份: <span id="my-role" class="role-text">等待分配...</span></div>
        <div id="turn-status"
            style="color: var(--text-main); font-size: 1.25em; font-family: var(--font-title); margin-top: 12px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">
            大厅准备中...
        </div>
        <div id="round-info" style="margin-top:6px;color:#bdc3c7;font-size:0.9em;">第 1 / 3 轮</div>
        <div id="score-board"></div>
        <div id="player-list"></div>
        <button id="discard-btn" onclick="discardSelectedCard()"
            style="display:none; background: #c0392b; margin-top: 10px;">🗑️ 弃掉选中的牌 (Pass)</button>
        <div id="my-hand"></div>
    </div>

    <!-- 自定义模态框 -->
    <div id="custom-modal" class="modal-overlay">
        <div class="modal-box">
            <div id="modal-title" class="modal-title">提示</div>
            <div id="modal-text" class="modal-content"></div>
            <div id="modal-buttons" class="modal-buttons"></div>
        </div>
    </div>

    <!-- 聊天室 -->
    <div id="chat-panel" style="display:none;" class="collapsed">
        <div class="chat-header" onclick="toggleChatPanel()">
            <span>💬 <span style="color:var(--primary);">矿洞频道</span></span>
            <span id="chat-toggle">▲</span>
        </div>
        <div id="chat-body">
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input id="chat-input" placeholder="输入消息..." maxlength="200" />
                <button onclick="sendChatMessage()">发送</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let selectedCard = null;
        let currentRoomId = null;
        let isHost = false;
        let selectedTargetPlayerId = null;
        let myPlayerKey = null;
        let myName = '';
        let localStream = null;
        const peers = {}; // remoteSocketId -> RTCPeerConnection

        // 模态框逻辑
        function showModal(title, text, buttons) {
            const overlay = document.getElementById('custom-modal');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            const btnContainer = document.getElementById('modal-buttons');
            btnContainer.innerHTML = '';

            buttons.forEach(btn => {
                const b = document.createElement('button');
                b.innerText = btn.text;
                if (btn.type === 'cancel') b.className = 'modal-btn-cancel';
                else if (btn.type === 'confirm') b.className = 'modal-btn-confirm';
                b.style.margin = "0 8px";
                b.onclick = () => {
                    closeModal();
                    if (btn.onClick) btn.onClick();
                };
                btnContainer.appendChild(b);
            });

            overlay.style.display = 'flex';
            void overlay.offsetWidth;
            overlay.classList.add('show');
        }

        function closeModal() {
            const overlay = document.getElementById('custom-modal');
            overlay.classList.remove('show');
            setTimeout(() => { if (!overlay.classList.contains('show')) overlay.style.display = 'none'; }, 300);
        }

        function showAlert(text, title = '提示') {
            showModal(title, text, [{ text: '确定', type: 'confirm' }]);
        }

        function showConfirm(text, onConfirm, onCancel, title = '系统询问') {
            showModal(title, text, [
                { text: '取消', type: 'cancel', onClick: onCancel },
                { text: '确定', type: 'confirm', onClick: onConfirm }
            ]);
        }

        socket.on('playerJoined', data => document.getElementById('player-count').innerText = data.playerCount);
        socket.on('playerLeft', data => document.getElementById('player-count').innerText = data.playerCount);

        // 确认/修改名字
        function confirmName() {
            const newName = document.getElementById('name-input').value.trim();
            if (!newName) { showAlert('请输入昵称！'); return; }
            myName = newName;
            document.getElementById('my-name').innerText = myName;
            if (currentRoomId) {
                socket.emit('changeName', { roomId: currentRoomId, newName: myName });
            }
        }

        socket.on('nameChanged', (data) => {
            myName = data.name;
            document.getElementById('my-name').innerText = myName;
        });

        function createRoom() {
            myName = document.getElementById('name-input').value.trim() || '玩家';
            socket.emit('createRoom', { name: myName });
        }

        function joinRoom() {
            const roomId = document.getElementById('room-input').value.trim();
            if (!roomId) { showAlert('请输入房间号'); return; }
            myName = document.getElementById('name-input').value.trim() || '玩家';
            socket.emit('joinRoom', { roomId, name: myName });
        }

        socket.on('roomJoined', data => {
            currentRoomId = data.roomId;
            isHost = data.isHost;
            myPlayerKey = data.playerKey;
            document.getElementById('room-id').innerText = currentRoomId;
            document.getElementById('start-btn').disabled = !isHost;
            document.getElementById('chat-panel').style.display = 'flex';
            document.getElementById('my-name').innerText = myName;
            // 把身份信息存到本地，用于断线重连
            try {
                localStorage.setItem('saboteur_roomId', currentRoomId);
                localStorage.setItem('saboteur_playerKey', myPlayerKey);
            } catch (e) { }
        });

        // 页面加载后，如果本地有记录，尝试自动重连
        (function tryReconnect() {
            try {
                const roomId = localStorage.getItem('saboteur_roomId');
                const playerKey = localStorage.getItem('saboteur_playerKey');
                if (roomId && playerKey) {
                    showConfirm(`发现你有一个未完成的对局 (房间号: ${roomId})，是否重连？`,
                        () => { socket.emit('reconnectPlayer', { roomId, playerKey }); },
                        () => {
                            localStorage.removeItem('saboteur_roomId');
                            localStorage.removeItem('saboteur_playerKey');
                        },
                        '重新连接'
                    );
                }
            } catch (e) { }
        })();

        socket.on('reconnectedState', data => {
            currentRoomId = data.roomId;
            myPlayerKey = localStorage.getItem('saboteur_playerKey');
            document.getElementById('room-id').innerText = currentRoomId;
            document.getElementById('tabletop').style.display = 'block';
            document.getElementById('player-area').style.display = 'block';
            document.getElementById('chat-panel').style.display = 'flex';
            myName = data.yourName || myName;
            document.getElementById('my-name').innerText = myName;
            document.getElementById('my-role').innerText = data.yourRole || '';
            document.getElementById('turn-status').innerText = '已重连，等待轮到你出牌...';
            renderHand(data.yourHand || []);
            renderBoard(data.board || {});
            updateScoresView({
                round: data.round,
                winners: null,
                msg: '',
                scores: data.scores || {},
                delta: {}
            });
        });

        socket.on('roomPlayers', data => {
            const listDiv = document.getElementById('player-list');
            listDiv.innerHTML = '玩家顺序（点击选择行动目标）：';
            data.players.forEach((p, index) => {
                const div = document.createElement('span');
                div.className = 'player-item';
                div.dataset.id = p.id;

                const displayName = p.name || p.id.slice(0, 4);
                const seatNo = index + 1;

                // 工具状态图标
                let toolsHtml = '';
                if (p.tools) {
                    const ti = (ok, label) => ok ? `<span style="color:#2ecc71;">${label}✔</span>` : `<span style="color:#e74c3c;text-decoration:line-through;">${label}❌</span>`;
                    toolsHtml = ` <span style="font-size:11px;">[${ti(p.tools.cart, '矿车')} ${ti(p.tools.lantern, '油灯')} ${ti(p.tools.pickaxe, '镐子')}]</span>`;
                }

                div.innerHTML = `${seatNo}. ${displayName}${p.disconnected ? ' (掉线)' : ''}${toolsHtml}`;

                if (p.id === selectedTargetPlayerId) {
                    div.classList.add('selected');
                }
                if (p.isCurrentTurn) {
                    div.classList.add('current');
                }

                div.onclick = () => {
                    selectedTargetPlayerId = p.id;
                    document.querySelectorAll('.player-item').forEach(el => el.classList.remove('selected'));
                    div.classList.add('selected');
                };
                listDiv.appendChild(div);

                // 如果语音已开启，对新玩家自动建立 WebRTC 连接
                if (localStream && p.id !== socket.id && !peers[p.id]) {
                    callPeer(p.id);
                }
            });
        });

        function createPeerConnection(remoteId) {
            // 如果已有连接，清理旧连接重建（避免 stale 状态）
            if (peers[remoteId]) {
                try { peers[remoteId].close(); } catch (e) { }
                delete peers[remoteId];
            }
            const pc = new RTCPeerConnection({
                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
            });
            peers[remoteId] = pc;

            if (localStream) {
                localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            }

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('voice-ice-candidate', {
                        targetId: remoteId,
                        candidate: event.candidate
                    });
                }
            };

            pc.ontrack = (event) => {
                let audio = document.getElementById('audio-' + remoteId);
                if (!audio) {
                    audio = document.createElement('audio');
                    audio.id = 'audio-' + remoteId;
                    audio.autoplay = true;
                    audio.style.display = 'none';
                    document.body.appendChild(audio);
                }
                audio.srcObject = event.streams[0];
            };

            return pc;
        }

        async function toggleVoice() {
            const btn = document.getElementById('voice-btn');
            if (!localStream) {
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    btn.innerText = '🔇 关闭语音';
                    btn.style.background = '#7f8c8d';
                    // 对当前房间内的所有其他玩家发起 WebRTC 连接
                    document.querySelectorAll('.player-item').forEach(el => {
                        const remoteId = el.dataset.id;
                        if (remoteId && remoteId !== socket.id) {
                            callPeer(remoteId);
                        }
                    });
                    // 广播通知其他玩家自己已开启语音
                    if (currentRoomId) {
                        socket.emit('voice-enabled', { roomId: currentRoomId });
                    }
                } catch (e) {
                    showAlert('获取麦克风失败：' + e.message);
                }
            } else {
                // 关闭本地音轨和所有连接
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
                Object.values(peers).forEach(pc => pc.close());
                for (const id in peers) delete peers[id];
                // 移除所有远端音频元素
                document.querySelectorAll('audio[id^="audio-"]').forEach(a => a.remove());
                btn.innerText = '🎙 开启语音';
                btn.style.background = '#16a085';
            }
        }

        async function callPeer(remoteId) {
            if (!localStream) return;
            const pc = createPeerConnection(remoteId);
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit('voice-offer', { targetId: remoteId, offer });
        }

        socket.on('voice-offer', async (data) => {
            const { from, offer } = data || {};
            if (!offer) return;
            if (!localStream) {
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const btn = document.getElementById('voice-btn');
                    btn.innerText = '🔇 关闭语音';
                    btn.style.background = '#7f8c8d';
                } catch (e) {
                    return;
                }
            }
            const pc = createPeerConnection(from);
            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            socket.emit('voice-answer', { targetId: from, answer });
        });

        socket.on('voice-answer', async (data) => {
            const { from, answer } = data || {};
            const pc = peers[from];
            if (!pc || !answer) return;
            await pc.setRemoteDescription(new RTCSessionDescription(answer));
        });

        socket.on('voice-ice-candidate', async (data) => {
            const { from, candidate } = data || {};
            const pc = peers[from];
            if (!pc || !candidate) return;
            try {
                await pc.addIceCandidate(new RTCIceCandidate(candidate));
            } catch (e) {
                console.error('Error adding ICE candidate', e);
            }
        });

        function startGame() {
            if (!currentRoomId) { showAlert('请先创建或加入房间'); return; }
            socket.emit('requestStartGame', { roomId: currentRoomId });
        }

        socket.on('gameStarted', (data) => {
            document.getElementById('tabletop').style.display = 'block';
            document.getElementById('player-area').style.display = 'block';
            document.getElementById('chat-panel').style.display = 'flex';
            document.getElementById('my-name').innerText = myName;
            document.getElementById('my-role').innerText = data.yourRole;
            document.getElementById('turn-status').innerText = '等待轮到你出牌...';
            renderHand(data.yourHand);
            renderBoard(data.board);
        });

        function renderHand(hand) {
            const handDiv = document.getElementById('my-hand');
            handDiv.innerHTML = '';
            hand.forEach(card => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card hand-card';
                // 使用大号字体显示道路图案
                const label = card.type === 'path' ? '道路' : (card.subType === 'sabotage' ? '破坏' :
                    card.subType === 'repair' ? '修理' :
                        card.subType === 'map' ? '地图' :
                            card.subType === 'rockfall' ? '落石' : '行动');
                cardDiv.innerHTML = `
                    <div class="card-symbol">${card.name}</div>
                    <div style="font-size:10px;">${label}</div>
                    ${card.type === 'path'
                        ? '<div style="position:absolute;bottom:4px;right:4px;font-size:12px;cursor:pointer;color:#2980b9;" class="rotate-btn">↻</div>'
                        : ''
                    }
                `;

                // 不同类型卡牌配不同配色
                if (card.type === 'action') {
                    if (card.subType === 'sabotage') {
                        cardDiv.style.background = '#ffebee';
                        cardDiv.style.borderColor = '#e53935';
                        cardDiv.querySelector('.card-symbol').textContent = '💣';
                    } else if (card.subType === 'repair') {
                        cardDiv.style.background = '#e8f5e9';
                        cardDiv.style.borderColor = '#43a047';
                        cardDiv.querySelector('.card-symbol').textContent = '🛠️';
                    } else if (card.subType === 'map') {
                        cardDiv.style.background = '#e3f2fd';
                        cardDiv.style.borderColor = '#1e88e5';
                        cardDiv.querySelector('.card-symbol').textContent = '🗺️';
                    } else if (card.subType === 'rockfall') {
                        cardDiv.style.background = '#fff3e0';
                        cardDiv.style.borderColor = '#fb8c00';
                        cardDiv.querySelector('.card-symbol').textContent = '💥';
                    }
                }

                cardDiv.onclick = (e) => {
                    // 如果点的是旋转按钮，不切换选中
                    if (e.target && e.target.classList.contains('rotate-btn')) {
                        return;
                    }
                    document.querySelectorAll('.hand-card').forEach(c => c.classList.remove('selected'));
                    cardDiv.classList.add('selected');
                    selectedCard = card;
                    document.getElementById('discard-btn').style.display = 'inline-block';
                };

                if (card.type === 'path') {
                    const rotateBtn = cardDiv.querySelector('.rotate-btn');
                    if (rotateBtn) {
                        rotateBtn.onclick = (e) => {
                            e.stopPropagation();
                            // 初始化 rotation
                            if (typeof card.rotation !== 'number') {
                                card.rotation = 0;
                            }
                            // 只允许 180° 旋转：上下、左右互换
                            if (Array.isArray(card.dirs) && card.dirs.length === 4) {
                                const [top, right, bottom, left] = card.dirs;
                                card.dirs = [bottom, left, top, right];
                            }
                            card.rotation = (card.rotation + 180) % 360;
                            const symbolEl = cardDiv.querySelector('.card-symbol');
                            if (symbolEl) {
                                symbolEl.style.transform = `rotate(${card.rotation}deg)`;
                            }
                        };
                    }
                }
                handDiv.appendChild(cardDiv);
            });
        }

        function renderBoard(boardData) {
            const boardGrid = document.getElementById('board-grid');
            boardGrid.innerHTML = '';
            const baseX = 100, baseY = 350, cardWidth = 80, cardHeight = 110;

            // 收集已占用位置和可放置的空位
            const occupied = new Set(Object.keys(boardData));
            const placeable = new Set();
            for (const coord of occupied) {
                const [x, y] = coord.split(',').map(Number);
                [[0, -1], [1, 0], [0, 1], [-1, 0]].forEach(([dx, dy]) => {
                    const nc = `${x + dx},${y + dy}`;
                    if (!occupied.has(nc)) placeable.add(nc);
                });
            }

            // 绘制网格背景（覆盖常用范围 + 所有可放置位置）
            const allCoords = new Set([...occupied, ...placeable]);
            for (let gx = -2; gx <= 10; gx++) {
                for (let gy = -4; gy <= 4; gy++) {
                    allCoords.add(`${gx},${gy}`);
                }
            }
            for (const coord of allCoords) {
                if (occupied.has(coord)) continue;
                const [x, y] = coord.split(',').map(Number);
                const cell = document.createElement('div');
                cell.className = 'grid-cell' + (placeable.has(coord) ? ' placeable' : '');
                cell.style.left = `${baseX + x * cardWidth}px`;
                cell.style.top = `${baseY + y * cardHeight}px`;
                boardGrid.appendChild(cell);
            }

            // 绘制已放置的卡牌
            for (const [coord, card] of Object.entries(boardData)) {
                const [x, y] = coord.split(',').map(Number);
                const cardEl = document.createElement('div');
                cardEl.style.left = `${baseX + x * cardWidth}px`;
                cardEl.style.top = `${baseY + y * cardHeight}px`;

                cardEl.innerHTML = `<div class="card-symbol">${card.name}</div>`;
                // 应用旋转
                if (card.rotation) {
                    const sym = cardEl.querySelector('.card-symbol');
                    if (sym) sym.style.transform = `rotate(${card.rotation}deg)`;
                }

                if (card.type === 'start') cardEl.className = 'card board-card start-card';
                else if (card.type === 'goal') {
                    cardEl.className = 'card board-card goal-card';
                    cardEl.innerHTML = `<div class="card-symbol">${card.faceUp ? card.name : '?'}</div>`;
                }
                else cardEl.className = 'card board-card';

                boardGrid.appendChild(cardEl);
            }
        }

        document.getElementById('board-grid').onclick = (event) => {
            if (!selectedCard) { showAlert("请先在下方选中一张手牌！"); return; }
            if (!currentRoomId) { showAlert("你还没有加入房间！"); return; }
            const rect = document.getElementById('board-grid').getBoundingClientRect();
            const gridX = Math.floor((event.clientX - rect.left - 100 + 40) / 80);
            const gridY = Math.floor((event.clientY - rect.top - 350 + 55) / 110);

            // 道路牌：正常铺路；行动牌：根据子类型决定用法
            const payload = { roomId: currentRoomId, card: selectedCard, targetX: gridX, targetY: gridY };
            if (selectedCard.type === 'action') {
                if (selectedCard.subType === 'sabotage' || selectedCard.subType === 'repair') {
                    if (!selectedTargetPlayerId) {
                        showAlert('请先在上方选择一个目标玩家。');
                        return;
                    }
                    payload.targetPlayerId = selectedTargetPlayerId;
                }
            }

            socket.emit('playCard', payload);
            // 不立即清除选中状态，等待服务端确认后再清除
        };

        function discardSelectedCard() {
            if (!selectedCard) return;
            showConfirm(`确定要弃掉并且跳过本回合吗？`, () => {
                if (!currentRoomId) { showAlert('你还没有加入房间！'); return; }
                socket.emit('discardCard', { roomId: currentRoomId, card: selectedCard });
                selectedCard = null;
                document.getElementById('discard-btn').style.display = 'none';
                document.querySelectorAll('.hand-card').forEach(c => c.classList.remove('selected'));
            });
        }

        socket.on('errorMsg', msg => showAlert(msg));
        socket.on('gameMsg', msg => showAlert(msg)); // 接收普通消息 (比如挖到了石头)
        socket.on('mapResult', data => {
            const text = data.isTreasure ? '这是金矿终点！' : '这是石头终点。';
            showAlert(`你偷看了终点 (${data.coord})：\n${text}`);
        });

        function updateScoresView(payload) {
            const scoreDiv = document.getElementById('score-board');
            const roundDiv = document.getElementById('round-info');
            const { round, winners, msg, scores, delta } = payload;
            if (roundDiv) roundDiv.innerText = `第 ${round} / 3 轮`;
            if (!scores) return;
            const key = myPlayerKey;
            const myScore = key ? (scores[key] ?? 0) : 0;
            const myDelta = key && delta && delta[key] ? ` (+${delta[key]})` : '';
            scoreDiv.innerText = `当前总金块：你 ${myScore}${myDelta}`;
        }

        // 单轮结束（自动开始下一轮）
        socket.on('roundOver', data => {
            showAlert(data.msg + `\n本轮结束，准备开始下一轮。`, '本轮结束');
            updateScoresView(data);
        });

        // 第三轮后整局结束
        socket.on('finalGameOver', data => {
            // 身份揭露
            let minerNames = [];
            let saboteurNames = [];
            if (Array.isArray(data.players)) {
                data.players.forEach(p => {
                    const name = p.name || p.playerKey?.slice(0, 4) || '';
                    if (p.role === 'Gold Miner') minerNames.push(name);
                    if (p.role === 'Saboteur') saboteurNames.push(name);
                });
            }
            const rolesText = `\n\n矿工: ${minerNames.join('、') || '无'}\n破坏者: ${saboteurNames.join('、') || '无'}`;
            showAlert(data.msg + `\n第 3 轮结束，整局游戏结束！` + rolesText, '游戏结束');
            updateScoresView(data);
            const statusDiv = document.getElementById('turn-status');
            statusDiv.innerText = "整局结束，刷新页面可重新开始新房间。";
            statusDiv.style.color = data.winners === 'Gold Miner' ? "#2ecc71" : "#e74c3c";
            document.getElementById('discard-btn').style.display = 'none';
        });
        socket.on('boardUpdated', newBoard => renderBoard(newBoard));
        socket.on('handUpdated', data => {
            // 服务端确认后才清除选中状态
            selectedCard = null;
            document.getElementById('discard-btn').style.display = 'none';
            document.querySelectorAll('.hand-card').forEach(c => c.classList.remove('selected'));
            renderHand(data.yourHand);
        });
        socket.on('turnUpdated', data => {
            const statusDiv = document.getElementById('turn-status');
            if (data.currentTurnId === socket.id) {
                statusDiv.innerText = "👉 现在轮到你出牌了！";
                statusDiv.style.color = "#2ecc71";
            } else {
                statusDiv.innerText = "⏳ 等待其他玩家出牌...";
                statusDiv.style.color = "#e74c3c";
            }
        });

        // 聊天室功能
        function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (!msg || !currentRoomId) return;
            socket.emit('chatMessage', { roomId: currentRoomId, message: msg });
            input.value = '';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && document.activeElement === document.getElementById('chat-input')) {
                sendChatMessage();
            }
        });

        function toggleChatPanel() {
            const body = document.getElementById('chat-body');
            const toggle = document.getElementById('chat-toggle');
            if (body.style.display === 'none') {
                body.style.display = 'block';
                toggle.innerText = '▼';
            } else {
                body.style.display = 'none';
                toggle.innerText = '▲';
            }
        }

        socket.on('chatMessage', data => {
            const msgDiv = document.getElementById('chat-messages');
            const el = document.createElement('div');
            el.className = 'chat-msg';
            el.innerHTML = `<span class="chat-name">${data.name}</span><span class="chat-time">${data.time}</span><br>${data.message}`;
            msgDiv.appendChild(el);
            msgDiv.scrollTop = msgDiv.scrollHeight;
        });

        // 当其他玩家开启语音时，如果自己也已开启，自动连接
        socket.on('voice-enabled', async (data) => {
            const { from } = data || {};
            if (!from || !localStream) return;
            // 对方刚开启语音，主动向对方发起连接
            callPeer(from);
        });
    </script>
</body>

</html>
